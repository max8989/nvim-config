unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display "tmux.conf reloaded"

set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

unbind C-b
set -g prefix C-s
bind C-s send-prefix

set -g mouse on

set-window-option -g mode-keys vi

# Splits keep current working directory (replaces % and ")
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Pane resize (repeatable: hold the key after one prefix press).
# Mirrors Hyprland's Super+Alt+h/j/k/l resize convention (Shift here since
# Alt is captured by the terminal). Pane navigation itself is handled by
# <C-h/j/k/l> via vim-tmux-navigator — no prefix needed.
bind -r H resize-pane -L 5
bind -r J resize-pane -D 3
bind -r K resize-pane -U 3
bind -r L resize-pane -R 5

# Quick last-window jump
bind Tab last-window

set-option -g status-position top

# set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'catppuccin/tmux#v2.1.0'

set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application} #{E:@catppuccin_status_session}"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

set -g status-style bg=default
